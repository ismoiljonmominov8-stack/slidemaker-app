function getPrice(count) {

function uid() {
  return Math.random().toString(36).slice(2, 10) + Date.now().toString(36);

async function resizeImageToBase64(file, maxW = 700, quality = 0.72) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(1, maxW / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = img.width * scale;
        canvas.height = img.height * scale;
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject;
      img.src = e.target.result;
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

// BACKEND API CLIENT
// Change API_BASE to wherever you deploy the /backend folder.

const API_BASE = "https://slidemaker-backend-dx2u.onrender.com";

function getAdminToken() {
  return localStorage.getItem("sm_admin_token") || "";
}

async function api(path, opts = {}) {
  const res = await fetch(`${API_BASE}${path}`, {
    ...opts,
    headers: { ...(opts.headers || {}) },
  });
  if (!res.ok) {
    const body = await res.text().catch(() => "");
    throw new Error(`API ${path} failed (${res.status}): ${body}`);
  }
  return res.json();
}

function apiJson(path, method, body, extraHeaders = {}) {
  return api(path, {
    method,
    headers: { "Content-Type": "application/json", ...extraHeaders },
    body: JSON.stringify(body),
  });
}

function getOrCreateUserId() {
  let id = localStorage.getItem("sm_user_id");
  if (!id) {
    id = uid();
    localStorage.setItem("sm_user_id", id);
  }
  return id;
}

/* ---------------------------------------------------------------
   BACKGROUND — drifting slide-card shapes (signature element)
--------------------------------------------------------------- */
function AnimatedBackground() {
  return (
    <div style={{ position: "absolute", inset: 0, overflow: "hidden", zIndex: 0 }}>
      <div style={{ position: "absolute", inset: 0, background: `radial-gradient(circle at 20% 20%, ${C.violetSoft}, transparent 45%), radial-gradient(circle at 80% 70%, ${C.goldSoft}, transparent 45%), ${C.bg}` }} />
      {[...Array(6)].map((_, i) => {
        const w = 90 + (i % 3) * 30;
        const h = w * 0.62;
        const left = (i * 17 + 5) % 92;
        const top = (i * 23 + 8) % 85;
        const rot = (i * 13) % 30 - 15;
        const anim = i % 2 === 0 ? "drift" : "drift2";
        const dur = 10 + i * 2;
        const color = i % 2 === 0 ? C.gold : C.violet;
        return (
          <div
            key={i}
            style={{
              position: "absolute",
              left: `${left}%`,
              top: `${top}%`,
              width: w,
              height: h,
              borderRadius: 10,
              border: `1.5px solid ${color}33`,
              background: `linear-gradient(135deg, ${color}14, transparent)`,
              transform: `rotate(${rot}deg)`,
              animation: `${anim} ${dur}s ease-in-out infinite`,
              backdropFilter: "blur(2px)",
            }}
          >
            <div style={{ margin: "10px 12px", height: 4, width: "55%", borderRadius: 2, background: `${color}55` }} />
            <div style={{ margin: "0 12px", height: 3, width: "35%", borderRadius: 2, background: `${color}33` }} />
          </div>
        );
      })}
    </div>
  );
}

/* ---------------------------------------------------------------
   CREATE FLOW
--------------------------------------------------------------- */
function CreateFlow({ lang, setLang, setView, cardInfo, userId, refreshMine }) {
  const t = T[lang];
  const [step, setStep] = useState(1);
  const [count, setCount] = useState(10);
  const [design, setDesign] = useState(DESIGNS[0]);
  const [color, setColor] = useState(DESIGNS[0].accent);
  const [topic, setTopic] = useState("");
  const [checkImg, setCheckImg] = useState(null);
  const [checkFile, setCheckFile] = useState(null);
  const [requestId, setRequestId] = useState(null);
  const [status, setStatus] = useState(null); // pending | approved | declined
  const [slides, setSlides] = useState([]);
  const [genProgress, setGenProgress] = useState(0);
  const [genTotal, setGenTotal] = useState(0);
  const [presTitle, setPresTitle] = useState("");
  const pollRef = useRef(null);

  useEffect(() => {
    return () => clearInterval(pollRef.current);
  }, []);

  function next() { setStep((s) => s + 1); }
  function back() {
    if (step === 1) setView("home");
    else setStep((s) => s - 1);
  }

  async function submitPayment() {
    try {
      const form = new FormData();
      form.append("userId", userId);
      form.append("type", "slides");
      form.append("slidesCount", String(count));
      form.append("topic", topic);
      form.append("lang", lang);
      form.append("design", design.id);
      form.append("color", color);
      form.append("checkImage", checkFile);
      const created = await api("/api/payments", { method: "POST", body: form });
      setRequestId(created.id);
      setStatus("pending");
      setStep(6);
      pollRef.current = setInterval(async () => {
        try {
          const mine = await api(`/api/payments/mine/${userId}`);
          const req = mine.find((r) => r.id === created.id);
          if (req && req.status !== "pending") {
            clearInterval(pollRef.current);
            setStatus(req.status);
            if (req.status === "approved") startGeneration();
          }
        } catch { /* keep polling on transient errors */ }
      }, 3500);
    } catch (e) {
      alert("To'lov so'rovini yuborishda xatolik: " + e.message);
    }
  }

  async function startGeneration() {
    setStep(7);
    setGenTotal(count);
    setGenProgress(0);
    const generated = [];
    for (let i = 0; i < count; i++) {
      const idx = i + 1;
      const layout = getLayoutForIndex(idx, count);
      const avoid = generated
        .slice(-4)
        .map((s) => [s.title, s.subtitle, s.quoteText, ...(s.bullets || []).slice(0, 1)].filter(Boolean).join(" — "));
      const slide = await generateSlideContent(topic, idx, count, lang, layout, avoid);
      generated.push(slide);
      setGenProgress(i + 1);
      setSlides([...generated]);
    }
    const title = generated[0]?.title || topic;
    setPresTitle(title);
    try {
      await apiJson("/api/presentations", "POST", {
        userId, topic, title, lang, design: design.id, color, slides: generated,
      });
    } catch (e) {
      console.error("Failed to save presentation:", e);
    }
    if (refreshMine) refreshMine();
    setStep(8);
  }

  return (
    <div style={{ minHeight: "100vh", background: C.bg }}>
      <TopBar lang={lang} setLang={setLang} onBack={back} title={t.appName} />
      <div style={{ maxWidth: 640, margin: "0 auto", padding: "10px 20px 60px" }}>
        <StepDots step={Math.min(step, 5)} total={5} />

        {step === 1 && (
          <GhostCard style={{ marginTop: 20 }} >
            <h2 className="sm-display" style={{ color: C.text, marginTop: 0 }}>{t.step1Title}</h2>
            <p className="sm-mono" style={{ color: C.gold, fontSize: 34, margin: "18px 0 6px" }}>{count} <span style={{ fontSize: 14, color: C.muted }}>{t.slideCountUnit}</span></p>
            <input type="range" min={3} max={20} value={count} onChange={(e) => setCount(Number(e.target.value))} style={{ width: "100%", accentColor: C.gold }} />
            <p style={{ color: C.muted, fontSize: 13 }}>{t.maxNote} · {getPrice(count).toLocaleString()} so'm</p>
            <NextBtn onClick={next} label={t.next} />
          </GhostCard>
        )}

        {step === 2 && (
          <GhostCard style={{ marginTop: 20 }}>
            <h2 className="sm-display" style={{ color: C.text, marginTop: 0 }}>{t.step2Title}</h2>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill,minmax(140px,1fr))", gap: 12, marginTop: 14 }}>
              {DESIGNS.map((d) => (
                <button
                  key={d.id}
                  onClick={() => { setDesign(d); setColor(d.accent); }}
                  className="sm-btn"
                  style={{
                    cursor: "pointer", borderRadius: 14, padding: 0, overflow: "hidden",
                    border: design.id === d.id ? `2px solid ${d.accent}` : `1px solid ${C.line}`,
                    background: d.bg,
                  }}
                >
                  <div style={{ height: 66, margin: 10, borderRadius: 8, border: `1px solid ${d.accent}55`, background: `linear-gradient(135deg, ${d.accent}22, transparent)`, position: "relative" }}>
                    <div style={{ position: "absolute", top: 8, left: 8, width: "60%", height: 4, borderRadius: 2, background: d.accent }} />
                    <div style={{ position: "absolute", top: 16, left: 8, width: "40%", height: 3, borderRadius: 2, background: `${d.accent}88` }} />
                  </div>
                  <div className="sm-display" style={{ color: C.text, fontSize: 12.5, padding: "0 10px 10px", fontWeight: 600 }}>{d.name}</div>
                </button>
              ))}
            </div>
            <NextBtn onClick={next} label={t.next} />
          </GhostCard>
        )}

        {step === 3 && (
          <GhostCard style={{ marginTop: 20 }}>
            <h2 className="sm-display" style={{ color: C.text, marginTop: 0, display: "flex", alignItems: "center", gap: 8 }}><Icon glyph="🎨" size={18} color={C.gold} />{t.step3Title}</h2>
            <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginTop: 14 }}>

                <input type="file" accept="image/*" hidden onChange={async (e) => {

            <Spinner size={36} color={C.violet} style={{ margin: "10px auto" }} />
            <h2 className="sm-display" style={{ color: C.text }}>{t.generating}</h2>

            <div style={{ textAlign: "center" }}>

function getLayoutForIndex(index, total) {
  if (index === 1) return "title";
  if (index === total) return "conclusion";
  if (index === 2 && total >= 5) return "agenda";
  const cycle = ["content", "stat", "comparison", "quote"];
  const startOffset = total >= 5 ? 3 : 2;
  const pos = index - startOffset;
  if (pos < 0) return "content";
  return cycle[pos % cycle.length];
}

async function generateSlideContent(topic, index, total, lang, layout, avoid) {
  try {
    const slide = await apiJson("/api/generate/slide", "POST", { topic, index, total, lang, layout, avoid });
    return { ...slide, layout };
  } catch (e) {
    console.error("Slide generation failed:", e);
    return { title: `${topic} — ${index}`, bullets: ["..."], layout };
  }
}

function hexNoHash(hex) { return (hex || "#E8A33D").replace("#", ""); }

const PPTX_BG = "12141C";
const PPTX_CARD = "1E212E";
const PPTX_TEXT = "F2F0EA";
const PPTX_MUTED = "9AA2B5";

async function downloadPresentation({ title, slides, color }) {
  if (typeof PptxGenJS === "undefined") {
    alert("PowerPoint engine hasn't loaded yet — please wait a moment and try again.");
    return;
  }
  const pptx = new PptxGenJS();
  pptx.defineLayout({ name: "SM", width: 10, height: 5.63 });
  pptx.layout = "SM";
  const accent = hexNoHash(color);

  // --- Cover slide ---
  const first = slides[0] || {};
  const cover = pptx.addSlide();
  cover.background = { color: PPTX_BG };
  cover.addText(title, { x: 0.7, y: 2.0, w: 8.6, h: 1.3, fontSize: 34, bold: true, color: PPTX_TEXT, fontFace: "Arial", align: "left", margin: 0 });
  if (first.subtitle) {
    cover.addText(first.subtitle, { x: 0.7, y: 3.05, w: 8.2, h: 0.7, fontSize: 15, color: accent, fontFace: "Arial", margin: 0 });
  }
  cover.addText("SlideMaker", { x: 0.7, y: 5.1, w: 6, h: 0.35, fontSize: 11, color: PPTX_MUTED, fontFace: "Arial", margin: 0 });

  // Skip index 0 (used as cover above) only if it was a "title" layout; otherwise render all
  const bodySlides = slides[0]?.layout === "title" ? slides.slice(1) : slides;

  bodySlides.forEach((s, i) => {
    const slide = pptx.addSlide();
    slide.background = { color: PPTX_BG };
    const num = String(i + 2).padStart(2, "0");
    slide.addText(num, { x: 0.6, y: 0.35, w: 1, h: 0.35, fontSize: 11, color: accent, fontFace: "Courier New", margin: 0 });
    slide.addText(s.title || "", { x: 0.6, y: 0.68, w: 8.8, h: 0.7, fontSize: 26, bold: true, color: PPTX_TEXT, fontFace: "Arial", margin: 0 });

    const layout = s.layout || "content";

    if (layout === "agenda") {
      const items = s.bullets || [];
      const rowH = 3.6 / Math.max(items.length, 1);
      items.forEach((item, idx) => {
        const y = 1.55 + idx * rowH;
        slide.addText(String(idx + 1).padStart(2, "0"), { x: 0.6, y, w: 0.7, h: rowH - 0.12, fontSize: 20, bold: true, color: accent, fontFace: "Arial", valign: "middle", margin: 0 });
        slide.addText(item, { x: 1.4, y, w: 8.0, h: rowH - 0.12, fontSize: 17, color: PPTX_TEXT, fontFace: "Arial", valign: "middle", margin: 0 });
      });
    } else if (layout === "comparison" && s.left && s.right) {
      [s.left, s.right].forEach((col, k) => {
        const x = 0.6 + k * 4.5;
        slide.addShape(pptx.ShapeType.roundRect, { x, y: 1.55, w: 4.2, h: 3.7, rectRadius: 0.08, fill: { color: PPTX_CARD }, line: { type: "none" } });
        slide.addText(col.label || "", { x: x + 0.25, y: 1.75, w: 3.7, h: 0.5, fontSize: 15, bold: true, color: accent, fontFace: "Arial", margin: 0 });
        const bulletText = (col.bullets || []).map((b, bi, arr) => ({ text: b, options: { bullet: { code: "25AA" }, breakLine: bi < arr.length - 1, color: PPTX_TEXT } }));
        slide.addText(bulletText, { x: x + 0.25, y: 2.3, w: 3.7, h: 2.75, fontSize: 13, fontFace: "Arial", valign: "top", lineSpacingMultiple: 1.3, margin: 0 });
      });
    } else if (layout === "quote" && s.quoteText) {
      slide.addText(`"${s.quoteText}"`, { x: 0.8, y: 1.9, w: 8.4, h: 1.8, fontSize: 24, italic: true, color: PPTX_TEXT, fontFace: "Arial", align: "left", valign: "middle", margin: 0 });
      if (s.bullets && s.bullets.length) {
        const bulletText = s.bullets.map((b, bi, arr) => ({ text: b, options: { bullet: { code: "25AA" }, breakLine: bi < arr.length - 1, color: PPTX_MUTED } }));
        slide.addText(bulletText, { x: 0.8, y: 3.9, w: 8.2, h: 1.3, fontSize: 13, fontFace: "Arial", valign: "top", lineSpacingMultiple: 1.3, margin: 0 });
      }
    } else if (layout === "stat" && s.chartData) {
      const bulletText = (s.bullets || []).map((b, bi, arr) => ({ text: b, options: { bullet: { code: "25AA" }, breakLine: bi < arr.length - 1, color: PPTX_TEXT } }));
      slide.addText(bulletText, { x: 0.6, y: 1.6, w: 4.0, h: 3.6, fontSize: 14, fontFace: "Arial", valign: "top", lineSpacingMultiple: 1.35, margin: 0 });
      slide.addChart(pptx.ChartType.bar, [{ name: "", labels: s.chartData.labels, values: s.chartData.values }], {
        x: 4.9, y: 1.6, w: 4.5, h: 3.6,
        chartColors: [accent],
        showLegend: false,
        showTitle: false,
        catAxisLabelColor: PPTX_MUTED,
        valAxisLabelColor: PPTX_MUTED,
        dataLabelColor: PPTX_TEXT,
        showValue: true,
        barGapWidthPct: 35,
      });
    } else if (layout === "conclusion") {
      const bulletText = (s.bullets || []).map((b, bi, arr) => ({ text: b, options: { bullet: { code: "25AA" }, breakLine: bi < arr.length - 1, color: PPTX_TEXT } }));
      slide.addText(bulletText, { x: 0.6, y: 1.6, w: 8.8, h: 2.6, fontSize: 16, fontFace: "Arial", valign: "top", lineSpacingMultiple: 1.4, margin: 0 });
      if (s.closing) {
        slide.addText(s.closing, { x: 0.6, y: 4.35, w: 8.8, h: 0.8, fontSize: 16, bold: true, color: accent, fontFace: "Arial", margin: 0 });
      }
    } else {
      // default "content" layout
      const bulletText = (s.bullets || []).map((b, bi, arr) => ({ text: b, options: { bullet: { code: "25AA" }, breakLine: bi < arr.length - 1, color: PPTX_TEXT } }));
      slide.addText(bulletText, { x: 0.6, y: 1.6, w: 8.8, h: 3.6, fontSize: 16, fontFace: "Arial", valign: "top", lineSpacingMultiple: 1.4, margin: 0 });
    }
  });

  await pptx.writeFile({ fileName: `${title.slice(0, 40).replace(/[^a-z0-9]/gi, "_") || "presentation"}.pptx` });
}

function MiniBarChart({ data, color }) {
  const items = (data.labels || []).map((l, i) => ({ name: l, value: data.values?.[i] ?? 0 }));
  const max = Math.max(...items.map((d) => d.value), 1);
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 8, height: 130, marginTop: 8, padding: "6px 2px 0" }}>
      {items.map((d, i) => (
        <div key={i} style={{ display: "flex", flexDirection: "column", alignItems: "center", flex: 1, height: "100%", justifyContent: "flex-end" }}>
          <div className="sm-mono" style={{ fontSize: 10, color: C.muted, marginBottom: 4 }}>{d.value}</div>
          <div style={{ width: "100%", height: `${(d.value / max) * 78}px`, background: color, borderRadius: "4px 4px 0 0", minHeight: 3 }} />
          <div style={{ fontSize: 9, color: C.muted, marginTop: 4, textAlign: "center", lineHeight: 1.2 }}>{d.name}</div>
        </div>
      ))}
    </div>
  );
}

function Subscription({ lang, setLang, setView, cardInfo, userId }) {
  const t = T[lang];
  const [plan, setPlan] = useState(null);
  const [checkImg, setCheckImg] = useState(null);
  const [checkFile, setCheckFile] = useState(null);
  const [status, setStatus] = useState(null);
  const [activeReqId, setActiveReqId] = useState(null);
  const pollRef = useRef(null);

  useEffect(() => {
    (async () => {
      try {
        const mine = await api(`/api/payments/mine/${userId}`);
        const subs = mine.filter((r) => r.type === "subscription").sort((a, b) => b.createdAt - a.createdAt);
        if (subs[0]) { setStatus(subs[0].status); setActiveReqId(subs[0].id); }
      } catch { /* ignore */ }
    })();
    return () => clearInterval(pollRef.current);
  }, [userId]);

  async function submit() {
    try {
      const form = new FormData();
      form.append("userId", userId);
      form.append("type", "subscription");
      form.append("plan", plan);
      form.append("checkImage", checkFile);
      const created = await api("/api/payments", { method: "POST", body: form });
      setActiveReqId(created.id);
      setStatus("pending");
      pollRef.current = setInterval(async () => {
        try {
          const mine = await api(`/api/payments/mine/${userId}`);
          const req = mine.find((r) => r.id === created.id);
          if (req && req.status !== "pending") {
            clearInterval(pollRef.current);
            setStatus(req.status);
          }
        } catch { /* keep polling */ }
      }, 3500);
    } catch (e) {
      alert("Xatolik: " + e.message);
    }
  }

  return (
    <div style={{ minHeight: "100vh", background: C.bg }}>
      <TopBar lang={lang} setLang={setLang} onBack={() => setView("home")} title={t.subTitle} />
      <div style={{ maxWidth: 520, margin: "0 auto", padding: "10px 20px 60px" }}>
        {status === "approved" ? (
          <GhostCard style={{ marginTop: 20, textAlign: "center" }}>
            <Icon glyph="♛" size={36} color={C.gold} style={{ margin: "6px auto" }} />
            <div className="sm-display" style={{ color: C.text, fontWeight: 700, fontSize: 18 }}>{t.subActive}</div>
          </GhostCard>
        ) : status === "pending" ? (
          <GhostCard style={{ marginTop: 20, textAlign: "center" }}>
            <Icon glyph="🕐" size={36} color={C.gold} style={{ margin: "6px auto", animation: "pulseGlow 1.6s ease-in-out infinite" }} />
            <div className="sm-display" style={{ color: C.text, fontWeight: 700, fontSize: 18 }}>{t.subPending}</div>
          </GhostCard>
        ) : !plan ? (
          <div style={{ display: "flex", gap: 14, marginTop: 20, flexWrap: "wrap" }}>
            <PlanCard label={t.subMonthly} price="50,000" onClick={() => setPlan("monthly")} accent={C.gold} />
            <PlanCard label={t.subYearly} price="100,000" onClick={() => setPlan("yearly")} accent={C.violet} best />
          </div>
        ) : (
          <GhostCard style={{ marginTop: 20 }}>
            <Row label={t.subTitle} value={plan === "monthly" ? t.subMonthly : t.subYearly} />
            <Row label={t.price} value={`${(plan === "monthly" ? 50000 : 100000).toLocaleString()} so'm`} accent />
            <div style={{ marginTop: 14, background: C.bg2, border: `1px solid ${C.line}`, borderRadius: 12, padding: 14 }}>
              <div style={{ color: C.muted, fontSize: 12 }}>{t.cardInfo}</div>
              <div className="sm-mono" style={{ color: C.text, fontSize: 19, marginTop: 4, letterSpacing: 1 }}>{cardInfo?.cardNumber || "**** **** **** ****"}</div>
              <div style={{ color: C.muted, fontSize: 12, marginTop: 4 }}>{t.cardName}: <span style={{ color: C.text }}>{cardInfo?.cardName || "—"}</span></div>
            </div>
            <label className="sm-btn" style={{ display: "flex", alignItems: "center", gap: 10, border: `1px dashed ${C.line}`, borderRadius: 12, padding: 14, cursor: "pointer", color: C.muted, marginTop: 16 }}>
              <Icon glyph="⬆" size={18} />{checkImg ? "✓ " + t.uploadCheck : t.uploadCheck}
              <input type="file" accept="image/*" hidden onChange={async (e) => { const f = e.target.files[0]; if (f) { setCheckFile(f); setCheckImg(await resizeImageToBase64(f)); } }} />
            </label>
            {checkImg && <img src={checkImg} alt="check" style={{ marginTop: 10, maxHeight: 160, borderRadius: 10, border: `1px solid ${C.line}` }} />}
            <NextBtn onClick={submit} label={t.send} disabled={!checkImg} />
          </GhostCard>
        )}
      </div>
    </div>
  );
}

function PlanCard({ label, price, onClick, accent, best }) {
  return (
    <button onClick={onClick} className="sm-btn" style={{ flex: 1, minWidth: 180, background: C.card, border: `1px solid ${best ? accent : C.line}`, borderRadius: 16, padding: 22, textAlign: "left", cursor: "pointer", position: "relative" }}>
      {best && <div className="sm-mono" style={{ position: "absolute", top: -10, right: 14, background: accent, color: "#1a1200", fontSize: 10, padding: "2px 8px", borderRadius: 999, fontWeight: 700 }}>BEST</div>}
      <div style={{ color: C.muted, fontSize: 13 }}>{label}</div>
      <div className="sm-display" style={{ color: C.text, fontSize: 26, fontWeight: 700, marginTop: 6 }}>{price} <span style={{ fontSize: 13, color: C.muted, fontWeight: 400 }}>so'm</span></div>
    </button>
  );
}

/* ---------------------------------------------------------------
   ADMIN PANEL — hidden route, not linked from any UI.
   Reachable only via URL hash #slidemaker-admin-2026.
   Real auth: password is checked server-side (POST /api/admin/login)
   which returns a JWT used for every admin request.
--------------------------------------------------------------- */
const ADMIN_HASH = "#slidemaker-admin-2026";

function AdminPanel() {
  const [authed, setAuthed] = useState(!!getAdminToken());
  const [pw, setPw] = useState("");
  const [loginError, setLoginError] = useState("");
  const [tab, setTab] = useState("slides");
  const [requests, setRequests] = useState([]);
  const [loading, setLoading] = useState(false);
  const [cardNumber, setCardNumber] = useState("");
  const [cardName, setCardName] = useState("");
  const [savedMsg, setSavedMsg] = useState("");

  const load = useCallback(async () => {
    setLoading(true);
    try {
      const items = await api("/api/payments", { headers: { Authorization: `Bearer ${getAdminToken()}` } });
      setRequests(items);
    } catch (e) {
      if (String(e.message).includes("401")) { localStorage.removeItem("sm_admin_token"); setAuthed(false); }
    }
    setLoading(false);
  }, []);

  useEffect(() => {
    if (!authed) return;
    load();
    (async () => {
      try {
        const ci = await api("/api/admin/card");
        setCardNumber(ci.cardNumber || "");
        setCardName(ci.cardName || "");
      } catch { /* ignore */ }
    })();
    const t = setInterval(load, 5000);
    return () => clearInterval(t);
  }, [authed, load]);

  async function login() {
    setLoginError("");
    try {
      const { token } = await apiJson("/api/admin/login", "POST", { password: pw });
      localStorage.setItem("sm_admin_token", token);
      setAuthed(true);
    } catch {
      setLoginError("Noto'g'ri parol");
    }
  }

  async function decide(req, status) {
    try {
      await apiJson(`/api/payments/${req.id}`, "PATCH", { status }, { Authorization: `Bearer ${getAdminToken()}` });
      load();
    } catch (e) {
      alert("Xatolik: " + e.message);
    }
  }

  async function saveCard() {
    try {
      await apiJson("/api/admin/card", "PUT", { cardNumber, cardName }, { Authorization: `Bearer ${getAdminToken()}` });
      setSavedMsg("Saqlandi ✓");
      setTimeout(() => setSavedMsg(""), 2000);
    } catch (e) {
      alert("Xatolik: " + e.message);
    }
  }

  if (!authed) {
    return (
      <div style={{ minHeight: "100vh", background: C.bg, display: "flex", alignItems: "center", justifyContent: "center" }}>
        <style>{FONTS}</style>
        <GhostCard style={{ width: 320 }}>
          <div className="sm-display" style={{ color: C.text, fontWeight: 700, fontSize: 18, marginBottom: 12 }}>SlideMaker Admin</div>
          <input
            type="password"
            value={pw}
            onChange={(e) => setPw(e.target.value)}
            placeholder="Parol"
            onKeyDown={(e) => e.key === "Enter" && login()}
            style={{ width: "100%", background: C.bg2, border: `1px solid ${C.line}`, borderRadius: 10, padding: 10, color: C.text }}
          />
          {loginError && <div style={{ color: C.danger, fontSize: 12, marginTop: 6 }}>{loginError}</div>}
          <NextBtn onClick={login} label="Kirish" />
        </GhostCard>
      </div>
    );
  }

  const slideReqs = requests.filter((r) => r.type === "slides");
  const subReqs = requests.filter((r) => r.type === "subscription");
  const shown = tab === "slides" ? slideReqs : tab === "sub" ? subReqs : [];

  return (
    <div style={{ minHeight: "100vh", background: C.bg }}>
      <style>{FONTS}</style>
      <div style={{ padding: "18px 24px" }}>
        <div className="sm-display" style={{ color: C.text, fontWeight: 700, fontSize: 18 }}>SlideMaker Admin</div>
      </div>
      <div style={{ maxWidth: 820, margin: "0 auto", padding: "0 20px 60px" }}>
        <div style={{ display: "flex", gap: 8, marginBottom: 18 }}>
          {[["slides", "Arizalar bo'limi"], ["sub", "Oylik obunachi arizalari"], ["card", "Karta sozlamalari"]].map(([id, label]) => (
            <button key={id} onClick={() => setTab(id)} className="sm-btn" style={{ padding: "9px 14px", borderRadius: 10, border: `1px solid ${tab === id ? C.gold : C.line}`, background: tab === id ? C.goldSoft : C.card, color: tab === id ? C.gold : C.muted, cursor: "pointer", fontSize: 13 }}>{label}</button>
          ))}
        </div>

        {tab === "card" ? (
          <GhostCard>
            <label style={{ color: C.muted, fontSize: 13 }}>Karta raqami</label>
            <input value={cardNumber} onChange={(e) => setCardNumber(e.target.value)} placeholder="8600 1234 5678 9012" style={{ width: "100%", marginTop: 4, marginBottom: 12, background: C.bg2, border: `1px solid ${C.line}`, borderRadius: 10, padding: 10, color: C.text }} />
            <label style={{ color: C.muted, fontSize: 13 }}>Karta egasi (F.I.O)</label>
            <input value={cardName} onChange={(e) => setCardName(e.target.value)} placeholder="Familiya Ism" style={{ width: "100%", marginTop: 4, background: C.bg2, border: `1px solid ${C.line}`, borderRadius: 10, padding: 10, color: C.text }} />
            <NextBtn onClick={saveCard} label={savedMsg || "Saqlash"} />
          </GhostCard>
        ) : loading && shown.length === 0 ? (
          <div style={{ color: C.muted, textAlign: "center", padding: 40 }}>Yuklanmoqda...</div>
        ) : shown.length === 0 ? (
          <GhostCard style={{ textAlign: "center", color: C.muted }}>So'rovlar yo'q</GhostCard>
        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
            {shown.map((r) => (
              <GhostCard key={r.id}>
                <div style={{ display: "flex", justifyContent: "space-between", flexWrap: "wrap", gap: 12 }}>
                  <div>
                    <div className="sm-mono" style={{ color: C.muted, fontSize: 11 }}>{r.userId} · {new Date(r.createdAt).toLocaleString()}</div>
                    <div className="sm-display" style={{ color: C.text, fontWeight: 600, marginTop: 4 }}>
                      {r.type === "slides" ? `${r.slidesCount} slayd` : (r.plan === "monthly" ? "1 oylik obuna" : "1 yillik obuna")}
                    </div>
                    <div className="sm-mono" style={{ color: C.gold, marginTop: 2 }}>{r.price.toLocaleString()} so'm</div>
                    <div style={{ marginTop: 6 }}>
                      <StatusPill status={r.status} />
                    </div>
                  </div>
                  {r.hasImage && <img src={`${API_BASE}/api/payments/${r.id}/image`} alt="check" style={{ maxHeight: 130, borderRadius: 8, border: `1px solid ${C.line}` }} />}
                </div>
                {r.status === "pending" && (
                  <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
                    <button onClick={() => decide(r, "approved")} className="sm-btn" style={{ flex: 1, background: `${C.good}22`, border: `1px solid ${C.good}66`, color: C.good, borderRadius: 10, padding: "9px", cursor: "pointer", fontWeight: 600 }}>Approve</button>
                    <button onClick={() => decide(r, "declined")} className="sm-btn" style={{ flex: 1, background: `${C.danger}22`, border: `1px solid ${C.danger}66`, color: C.danger, borderRadius: 10, padding: "9px", cursor: "pointer", fontWeight: 600 }}>Decline</button>
                  </div>
                )}
              </GhostCard>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function StatusPill({ status }) {
  const map = { pending: [C.gold, "Kutilmoqda"], approved: [C.good, "Tasdiqlangan"], declined: [C.danger, "Rad etilgan"] };
  const [color, label] = map[status] || [C.muted, status];
  return <span className="sm-mono" style={{ color, background: `${color}1a`, border: `1px solid ${color}55`, borderRadius: 999, padding: "2px 10px", fontSize: 11 }}>{label}</span>;
}

/* ---------------------------------------------------------------
   ROOT APP
--------------------------------------------------------------- */
function MainApp() {
  const [view, setView] = useState("home");
  const [lang, setLang] = useState("uz");
  const [userId, setUserId] = useState(null);
  const [cardInfo, setCardInfo] = useState(null);
  const [mineList, setMineList] = useState([]);
  const [mineLoading, setMineLoading] = useState(false);

  useEffect(() => {
    (async () => {
      setUserId(getOrCreateUserId());
      try {
        const ci = await api("/api/admin/card");
        setCardInfo(ci);
      } catch { /* backend not reachable yet — card just shows placeholder */ }
    })();
  }, []);

  const refreshMine = useCallback(async () => {
    setMineLoading(true);
    try {
      const items = await api(`/api/presentations/${getOrCreateUserId()}`);
      setMineList(items);
    } catch { /* ignore */ }
    setMineLoading(false);
  }, []);

  useEffect(() => { if (view === "mine") refreshMine(); }, [view, refreshMine]);

  return (
    <div className="sm-body" style={{ background: C.bg, minHeight: "100vh" }}>
      <style>{FONTS}</style>
      {view === "home" && <Home lang={lang} setLang={setLang} setView={setView} />}
      {view === "create" && userId && <CreateFlow lang={lang} setLang={setLang} setView={setView} cardInfo={cardInfo} userId={userId} refreshMine={refreshMine} />}
      {view === "mine" && <MyPresentations lang={lang} setLang={setLang} setView={setView} list={mineList} loading={mineLoading} />}
      {view === "sub" && userId && <Subscription lang={lang} setLang={setLang} setView={setView} cardInfo={cardInfo} userId={userId} />}
    </div>
  );
}

function App() {
  const [isAdminRoute, setIsAdminRoute] = useState(false);

  useEffect(() => {
    setIsAdminRoute(window.location.hash === ADMIN_HASH);
    const onHash = () => setIsAdminRoute(window.location.hash === ADMIN_HASH);
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);

  return isAdminRoute ? <AdminPanel /> : <MainApp />;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
